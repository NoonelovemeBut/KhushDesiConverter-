kind = "web"
previewPath = "/"
title = "KhusDesiConverter"
version = "1.0.0"
id = "artifacts/khus-desi-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23220

[services.development]
run = "pnpm --filter @workspace/khus-desi-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khus-desi-converter", "run", "build" ]
publicDir = "artifacts/khus-desi-converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23220"
BASE_PATH = "/"
